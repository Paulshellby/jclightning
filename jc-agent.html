<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>JC Lightning — 外贸助手 Agent</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
  .topbar{background:#0e0c0a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-logo{font-size:15px;font-weight:500;letter-spacing:.02em}
  .topbar-logo span{color:#c9a24e}
  .topbar-r{display:flex;align-items:center;gap:12px}
  .topbar-key{font-size:12px;color:#888;cursor:pointer;display:flex;align-items:center;gap:6px;background:none;border:1px solid #333;padding:5px 10px;border-radius:6px;transition:all .2s}
  .topbar-key:hover{color:#ccc;border-color:#666}
  .topbar-key.has{color:#6ee7b7;border-color:#6ee7b7}
  .tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid #e5e5e5;overflow-x:auto;position:sticky;top:53px;z-index:99}
  .tab{padding:12px 18px;font-size:13px;border:none;background:none;cursor:pointer;color:#888;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
  .tab:hover{color:#1a1a1a;background:#fafaf8}
  .tab.active{color:#0e0c0a;border-bottom-color:#c9a24e;font-weight:500}
  .container{max-width:800px;margin:0 auto;padding:20px 16px 80px}
  .card{background:#fff;border-radius:10px;border:1px solid #e5e5e5;padding:20px;margin-bottom:14px}
  .card-title{font-size:13px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .row3{grid-template-columns:1fr 1fr 1fr}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:12px;color:#888}
  select,input[type=text],input[type=password],textarea{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fafafa;color:#1a1a1a;font-family:inherit}
  select:focus,input:focus,textarea:focus{outline:none;border-color:#0e0c0a;background:#fff}
  textarea{resize:vertical;min-height:80px}
  .checks{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
  .checks label{font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer;color:#444}
  .btn{display:block;width:100%;padding:11px;background:#0e0c0a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
  .btn:hover{opacity:.85}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500}
  .btn-sm:hover{background:#f5f5f3}
  .btn-copy{border-color:#6ee7b7;color:#065f46}
  .status{font-size:13px;color:#888;display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:0 4px}
  .dot{width:7px;height:7px;border-radius:50%;background:#6ee7b7;flex-shrink:0}
  .dot.spin{background:#f59e0b;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .result-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px;margin-bottom:10px}
  .result-hd{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .avatar{width:40px;height:40px;border-radius:50%;background:#d1fae5;color:#065f46;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
  .avatar2{background:#fef3c7;color:#92400e}
  .avatar3{background:#dbeafe;color:#1e40af}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .tag{font-size:11px;padding:3px 9px;border-radius:20px;background:#f5f5f3;border:1px solid #e5e5e5;color:#555}
  .tag-g{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
  .tag-b{background:#dbeafe;border-color:#93c5fd;color:#1e40af}
  .tag-y{background:#fef3c7;border-color:#fcd34d;color:#92400e}
  .info-box{background:#f9f9f8;border:1px solid #e5e5e5;border-radius:8px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-top:10px}
  .info-box h4{font-size:14px;font-weight:500;margin-bottom:6px;color:#0e0c0a}
  .info-box h4:not(:first-child){margin-top:14px}
  .divider{border:none;border-top:1px solid #e5e5e5;margin:12px 0}
  .actions{display:flex;gap:8px}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
  .modal.open{display:flex}
  .modal-box{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:420px}
  .modal-title{font-size:16px;font-weight:500;margin-bottom:6px}
  .modal-sub{font-size:13px;color:#888;margin-bottom:16px}
  .modal-actions{display:flex;gap:8px;margin-top:14px}
  .modal-actions button{flex:1}
  .btn-cancel{background:#f5f5f3;color:#1a1a1a;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:14px;cursor:pointer}
  .empty{text-align:center;padding:32px;color:#999;font-size:14px}
  .mode-panel{display:none}
  .mode-panel.active{display:block}
  @media(max-width:520px){.row,.row3{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">JC <span>Lightning</span> · 外贸助手</div>
  <div class="topbar-r">
    <span style="font-size:11px;color:#666;display:none" id="modeLabel"></span>
    <button class="topbar-key" id="keyBtn" onclick="openKeyModal()">⚙ <span id="keyStatus">未设置 Key</span></button>
  </div>
</div>

<div class="tabs" id="tabBar">
  <button class="tab active" data-mode="leads">🔍 找客户</button>
  <button class="tab" data-mode="market">📊 市场情报</button>
  <button class="tab" data-mode="product">🎯 选品推荐</button>
  <button class="tab" data-mode="competitor">👀 竞品分析</button>
  <button class="tab" data-mode="regs">📋 查法规</button>
  <button class="tab" data-mode="email">✏ 写邮件</button>
  <button class="tab" data-mode="social">📱 社媒内容</button>
</div>

<div class="container">

  <!-- ====== MODE 1: 找客户 ====== -->
  <div class="mode-panel active" id="panel-leads">
    <div class="card">
      <div class="card-title">🔍 查找潜在客户</div>
      <div class="row">
        <div class="field"><label>目标国家</label><select id="ld-country"><option value="Colombia">🇨🇴 哥伦比亚</option><option value="South Africa">🇿🇦 南非</option><option value="Australia">🇦🇺 澳大利亚</option><option value="Ecuador">🇪🇨 厄瓜多尔</option><option value="Spain">🇪🇸 西班牙</option></select></div>
        <div class="field"><label>客户类型</label><select id="ld-industry"><option value="solar lighting distributor">太阳能灯具经销商</option><option value="electrical equipment importer">电气设备进口商</option><option value="solar energy contractor">太阳能工程商</option><option value="lighting wholesaler">灯具批发商</option><option value="renewable energy company">可再生能源公司</option></select></div>
      </div>
      <div class="checks">
        <label><input type="checkbox" id="ld-c1" checked> 老板/Owner/CEO</label>
        <label><input type="checkbox" id="ld-c2" checked> 采购经理</label>
        <label><input type="checkbox" id="ld-c3" checked> 销售/商务总监</label>

      <button class="btn" id="ld-btn" onclick="runLeads()">🔍 搜索客户</button>
    </div>
  </div>

  <!-- ====== MODE 2: 市场情报 ====== -->
  <div class="mode-panel" id="panel-market">
    <div class="card">
      <div class="card-title">📊 市场情报</div>
      <div class="row">
        <div class="field"><label>目标国家</label><select id="mk-country"><option value="Colombia">🇨🇴 哥伦比亚</option><option value="South Africa">🇿🇦 南非</option><option value="Australia">🇦🇺 澳大利亚</option><option value="Ecuador">🇪🇨 厄瓜多尔</option><option value="Spain">🇪🇸 西班牙</option></select></div>
        <div class="field"><label>关注重点</label><select id="mk-focus"><option value="full">全面分析</option><option value="demand">需求趋势</option><option value="duties">关税成本</option><option value="energy">能源现状</option></select></div>
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:8px">获取目标市场的能源现状、太阳能照明需求、进口关税、认证要求和分销渠道信息。</div>
      <button class="btn" id="mk-btn" onclick="runMarket()">📊 获取市场情报</button>
    </div>
  </div>

  <!-- ====== MODE 3: 选品推荐 ====== -->
  <div class="mode-panel" id="panel-product">
    <div class="card">
      <div class="card-title">🎯 选品推荐</div>
      <div class="row">
        <div class="field"><label>目标国家</label><select id="pp-country"><option value="Colombia">🇨🇴 哥伦比亚</option><option value="South Africa">🇿🇦 南非</option><option value="Australia">🇦🇺 澳大利亚</option><option value="Ecuador">🇪🇨 厄瓜多尔</option><option value="Spain">🇪🇸 西班牙</option></select></div>
        <div class="field"><label>客户类型</label><select id="pp-channel"><option value="distributor">分销商/批发</option><option value="installer">安装商/工程公司</option><option value="retail">零售商超</option><option value="project">项目采购</option></select></div>
      </div>
      <button class="btn" id="pp-btn" onclick="runProductFit()">🎯 分析选品策略</button>
    </div>
  </div>

  <!-- ====== MODE 4: 竞品分析 ====== -->
  <div class="mode-panel" id="panel-competitor">
    <div class="card">
      <div class="card-title">👀 竞品分析</div>
      <div class="row">
        <div class="field"><label>目标市场</label><select id="cp-country"><option value="Colombia">🇨🇴 哥伦比亚</option><option value="South Africa">🇿🇦 南非</option><option value="Australia">🇦🇺 澳大利亚</option><option value="Ecuador">🇪🇨 厄瓜多尔</option><option value="Spain">🇪🇸 西班牙</option></select></div>
        <div class="field"><label>产品品类</label><select id="cp-category"><option value="solar security lights">太阳能安防灯</option><option value="solar garden lights">太阳能花园灯</option><option value="solar wall lanterns">太阳能装饰壁灯</option><option value="solar floodlights">太阳能投光灯</option><option value="all solar outdoor lighting">全品类</option></select></div>
      </div>
      <button class="btn" id="cp-btn" onclick="runCompetitor()">👀 分析竞争对手</button>
    </div>
  </div>

  <!-- ====== MODE 5: 查法规 ====== -->
  <div class="mode-panel" id="panel-regs">
    <div class="card">
      <div class="card-title">📋 进口法规查询</div>
      <div class="row">
        <div class="field"><label>目标国家</label><select id="rg-country"><option value="Colombia">🇨🇴 哥伦比亚</option><option value="South Africa">🇿🇦 南非</option><option value="Australia">🇦🇺 澳大利亚</option><option value="Ecuador">🇪🇨 厄瓜多尔</option><option value="Spain">🇪🇸 西班牙</option></select></div>
        <div class="field"><label>查询内容</label><select id="rg-topic"><option value="all">全部法规信息</option><option value="tariff">关税/HS编码</option><option value="certification">认证要求</option><option value="labeling">标签/包装要求</option></select></div>
      </div>
      <button class="btn" id="rg-btn" onclick="runRegs()">📋 查询法规</button>
    </div>
  </div>

  <!-- ====== MODE 6: 写邮件 ====== -->
  <div class="mode-panel" id="panel-email">
    <div class="card">
      <div class="card-title">✏ 智能写邮件</div>
      <div class="row">
        <div class="field"><label>收件人国家</label><select id="em-country"><option value="Colombia">🇨🇴 哥伦比亚</option><option value="South Africa">🇿🇦 南非</option><option value="Australia">🇦🇺 澳大利亚</option><option value="Ecuador">🇪🇨 厄瓜多尔</option><option value="Spain">🇪🇸 西班牙</option></select></div>
        <div class="field"><label>邮件类型</label><select id="em-type"><option value="cold">初次开发信</option><option value="followup">跟进邮件(未回复)</option><option value="quote">报价跟进</option><option value="sample">样品确认后</option></select></div>
      </div>
      <div class="row">
        <div class="field"><label>收件人姓名</label><input type="text" id="em-name" placeholder="例: Carlos Mendoza"></div>
        <div class="field"><label>公司名</label><input type="text" id="em-company" placeholder="例: Energía Solar Ltda"></div>
      </div>
      <div class="field" style="margin-bottom:12px"><label>补充信息（可选）</label><textarea id="em-extra" placeholder="产品兴趣、之前沟通内容等…"></textarea></div>
      <button class="btn" id="em-btn" onclick="runEmail()">✏ 生成邮件</button>
    </div>
  </div>

  <!-- ====== MODE 7: 社媒内容 ====== -->
  <div class="mode-panel" id="panel-social">
    <div class="card">
      <div class="card-title">📱 社媒内容生成</div>
      <div class="row">
        <div class="field"><label>产品</label><select id="sm-product">
          <option value="PIR motion sensor wall light">PIR 感应壁灯</option>
          <option value="3-head solar floodlight">三头投光灯</option>
          <option value="30W solar floodlight">30W 泛光灯</option>
          <option value="all-in-one solar street light">一体化路灯</option>
          <option value="up-down solar wall light">上下出光壁灯</option>
          <option value="sphere gate pillar light">球形门柱灯</option>
          <option value="solar bollard path light">立柱草坪灯</option>
          <option value="garden stake light 8-pack">花园插地灯8只装</option>
          <option value="spike spotlight">景观聚光灯</option>
          <option value="solar wall lantern">户外装饰壁灯</option>
          <option value="solar Edison string lights">爱迪生串灯</option>
          <option value="solar deck step light">台阶甲板灯</option>
          <option value="portable camping lantern">手提露营灯</option>
          <option value="solar bug zapper">太阳能灭蚊灯</option>
        </select></div>
        <div class="field"><label>目标市场</label><select id="sm-country">
          <option value="Colombia">🇨🇴 哥伦比亚</option>
          <option value="South Africa">🇿🇦 南非</option>
          <option value="Australia">🇦🇺 澳大利亚</option>
          <option value="Ecuador">🇪🇨 厄瓜多尔</option>
          <option value="Spain">🇪🇸 西班牙</option>
          <option value="通用">🌍 通用</option>
        </select></div>
      </div>
      <div class="row">
        <div class="field"><label>内容类型</label><select id="sm-type">
          <option value="post">📝 帖子文案 (EN+ES)</option>
          <option value="image-prompt">🎨 AI 图片提示词</option>
          <option value="video-script">🎬 短视频脚本 (Reels/TikTok)</option>
          <option value="weekly-plan">📅 一周内容计划</option>
        </select></div>
        <div class="field"><label>风格</label><select id="sm-tone">
          <option value="professional">专业/B2B</option>
          <option value="story">故事性/场景化</option>
          <option value="data">数据驱动/痛点</option>
          <option value="mixed">混合风格</option>
        </select></div>
      </div>
      <button class="btn" id="sm-btn" onclick="runSocial()">📱 生成内容</button>
    </div>
  </div>

  <!-- ====== Results ====== -->
  <div id="statusWrap" style="display:none" class="status">
    <div class="dot spin" id="dot"></div>
    <span id="statusTxt">处理中...</span>
  </div>
  <div id="results"></div>

</div>

<!-- API Key Modal -->
<div class="modal" id="keyModal">
  <div class="modal-box">
    <div class="modal-title">设置 Anthropic API Key</div>
    <div class="modal-sub">Key 只保存在你的浏览器本地，不上传任何服务器。</div>
    <input type="password" id="keyInput" placeholder="sk-ant-api03-...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeKeyModal()">取消</button>
      <button class="btn" onclick="saveKey()">保存</button>
    </div>
  </div>
</div>

<script>
// ====== Shared State ======
function getKey(){return localStorage.getItem('jc_api_key')||''}
function saveKey(){const v=document.getElementById('keyInput').value.trim();if(!v)return;localStorage.setItem('jc_api_key',v);updateKeyUI();closeKeyModal()}
function openKeyModal(){document.getElementById('keyInput').value=getKey();document.getElementById('keyModal').classList.add('open')}
function closeKeyModal(){document.getElementById('keyModal').classList.remove('open')}
function updateKeyUI(){const has=getKey();const s=document.getElementById('keyStatus');const b=document.getElementById('keyBtn');s.textContent=has?'已设置':'未设置 Key';b.className='topbar-key'+(has?' has':'')}
window.addEventListener('load',updateKeyUI);

// ====== Tab Switching ======
document.getElementById('tabBar').addEventListener('click',e=>{
  if(!e.target.classList.contains('tab'))return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+e.target.dataset.mode).classList.add('active');
  document.getElementById('results').innerHTML='';
  document.getElementById('statusWrap').style.display='none';
});

// ====== API Call Helper ======
async function callClaude(prompt,maxTokens=2500){
  const key=getKey();
  if(!key){openKeyModal();throw new Error('no_key')}
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:maxTokens,
      messages:[{role:'user',content:prompt}],
      tools:[{type:'web_search',name:'web_search'}],
      tool_choice:{type:'auto'}
    })
  });
  if(!resp.ok){
    if(resp.status===401||resp.status===403)throw new Error('invalid_key');
    throw new Error(`API ${resp.status}`);
  }
  const data=await resp.json();
  let text='';
  if(data.content)data.content.forEach(b=>{if(b.type==='text')text+=b.text});
  return text;
}

function setLoading(btnId,txt){
  document.getElementById(btnId).disabled=true;
  document.getElementById('statusWrap').style.display='flex';
  document.getElementById('statusTxt').textContent=txt;
  document.getElementById('dot').className='dot spin';
  document.getElementById('results').innerHTML='';
}
function setDone(btnId,txt){
  document.getElementById('dot').className='dot';
  document.getElementById('statusTxt').textContent=txt;
  document.getElementById(btnId).disabled=false;
}
function showError(btnId,msg){
  document.getElementById('results').innerHTML=`<div class="empty">${msg}</div>`;
  setDone(btnId,'出错 — 请重试');
}

// ====== MODE 1: 找客户 ======
async function runLeads(){
  const country=document.getElementById('ld-country').value;
  const industry=document.getElementById('ld-industry').value;
  const titles=[
    document.getElementById('ld-c1').checked?'Owner, CEO, Director, Founder, Gerente General, Propietario, Managing Director':'',
    document.getElementById('ld-c2').checked?'Purchasing Manager, Import Manager, Compras, Procurement Manager, Jefe de Compras':'',
    document.getElementById('ld-c3').checked?'Sales Director, Commercial Director, Director Comercial, Business Development':''
  ].filter(Boolean).join(', ');

  setLoading('ld-btn',`正在搜索 ${country} 的 ${industry}...`);

  const searches={
    'Colombia':'site:linkedin.com/in "Colombia" solar OR iluminación OR energía importer OR distribuidor OR compras',
    'South Africa':'site:linkedin.com/in "South Africa" solar OR lighting OR energy importer OR distributor OR procurement',
    'Australia':'site:linkedin.com/in "Australia" solar OR lighting OR energy importer OR distributor OR wholesale',
    'Ecuador':'site:linkedin.com/in "Ecuador" solar OR iluminación OR energía importador OR distribuidor',
    'Spain':'site:linkedin.com/in "Spain" solar OR iluminación OR energía importador OR distribuidor OR compras'
  };
  const q=searches[country]||`site:linkedin.com/in "${country}" solar OR lighting importer`;

  const prompt=`You are a B2B lead researcher. Find REAL business contacts in ${country} — ${industry}.

Search query: ${q}
Job titles: ${titles}

Use web search to find real LinkedIn profiles. Return ONLY raw JSON array:
[{"name":"Full Name","title":"Job Title","company":"Company Name","country":"${country}","email":null,"linkedin":"URL or null","industry":"${industry}","employees":"size or null"}]

6-8 real contacts. Start with [, end with ]. No other text.`;

  try{
    const text=await callClaude(prompt,3000);
    const m=text.match(/\[[\s\S]*\]/);
    const leads=m?JSON.parse(m[0]):fallbackLeads(country);
    renderLeads(leads);
    setDone('ld-btn',`✅ 实时搜索 — 找到 ${leads.length} 个潜在客户`);
  }catch(e){
    if(e.message==='invalid_key'){showError('ld-btn','API Key 无效，请点击右上角重新设置');return}
    const leads=fallbackLeads(country);
    renderLeads(leads);

// ====== Utilities ======
function copyText(btn){
  const box=btn.parentElement.nextElementSibling||btn.previousElementSibling;
  const text=box?.innerText||'';
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='✅ 已复制';setTimeout(()=>{btn.textContent='📋 复制'},2000)});
}

function formatMarkdown(t){
  return t.replace(/^### (.+)/gm,'<h4>$1</h4>').replace(/^## (.+)/gm,'<h3 style="font-size:16px;font-weight:500;margin:12px 0 8px;color:#0e0c0a">$1</h3>').replace(/^- (.+)/gm,'<span style="display:block;padding:2px 0">• $1</span>').replace(/\|(.+)\|/g,(m)=>{if(!m.includes('---'))return'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;margin:8px 0">'+m.split('\n').filter(Boolean).map((r,i)=>`<tr>${r.split('|').filter(Boolean).map(c=>`<${i?'td':'th'} style="padding:6px 10px;border:1px solid #e5e5e5;text-align:left">${c.trim()}</${i?'td':'th'}>`).join('')}</tr>`).join('')+'</table></div>';return''});
}
