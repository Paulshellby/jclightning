<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Lightning — Living Logo (atmosphere)</title>
<style>
  html,body{ margin:0; height:100%; overflow:hidden;
    background:radial-gradient(125% 125% at 50% 45%, #0c0a07 0%, #080604 55%, #050302 100%); }
  #c{ display:block; width:100vw; height:100vh; cursor:crosshair; }
  .hint{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%); color:rgba(255,222,140,.6);
         font-family:system-ui,sans-serif; font-size:12px; letter-spacing:.16em; text-transform:uppercase; pointer-events:none; }
  .hint b{ color:#fff0c0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">move for arcs &middot; <b>click to discharge</b> &middot; it always reforms</div>
<script>
(function(){
  var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  var W,H,DPR, parts=[], bg=[], boke=[], logoTex=null, mx=-1e4, my=-1e4, t=0, pulse=-0.35, flash=0, cohesion=1;
  var MAX=9000, bolt=null, boltTimer=60, skyBolt=null, skyTimer=160, lrect={x:0,y:0,w:0,h:0};
  var img=new Image(); img.src='images/logo.png';

  function initBG(){
    bg.length=0; for(var i=0;i<130;i++){ var z=0.25+Math.random()*0.75;
      bg.push({ x:Math.random()*W, y:Math.random()*H, z:z, vy:-(0.12+z*0.5)*DPR, vx:(Math.random()-0.5)*0.25*DPR, ph:Math.random()*6.283 }); }
    boke.length=0; for(var b=0;b<7;b++){ var z2=0.3+Math.random()*0.6;
      boke.push({ x:Math.random()*W, y:Math.random()*H, z:z2, vy:-(0.05+z2*0.18)*DPR, vx:(Math.random()-0.5)*0.12*DPR, r:(28+Math.random()*46)*DPR, ph:Math.random()*6.283 }); }
  }

  function rebuild(){
    if(innerWidth<10||innerHeight<10) return;
    DPR=Math.min(window.devicePixelRatio||1, 2);
    W=canvas.width=Math.round(innerWidth*DPR); H=canvas.height=Math.round(innerHeight*DPR);
    canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
    initBG();
    if(!img.complete || !img.naturalWidth) return;
    var scale=Math.min(W,H)*0.74 / Math.max(img.naturalWidth,img.naturalHeight);
    lrect.w=img.naturalWidth*scale; lrect.h=img.naturalHeight*scale; lrect.x=(W-lrect.w)/2; lrect.y=(H-lrect.h)/2;
    var off=document.createElement('canvas'); off.width=W; off.height=H;
    var o=off.getContext('2d'); o.drawImage(img,lrect.x,lrect.y,lrect.w,lrect.h);
    var imgd=o.getImageData(0,0,W,H), d=imgd.data, pts=[], step=Math.max(2, Math.round(2.6*DPR));
    for(var y=0;y<H;y+=step){ for(var x=0;x<W;x+=step){ var i=(y*W+x)*4, bri=(d[i]+d[i+1]+d[i+2])/3; if(bri>50) pts.push(x,y,bri); }}
    for(var ai=0;ai<d.length;ai+=4){ d[ai+3]=Math.min(255,((d[ai]+d[ai+1]+d[ai+2])/3)*1.6)|0; }
    o.putImageData(imgd,0,0); logoTex=off;
    var n=pts.length/3, stride=n>MAX?Math.ceil(n/MAX):1; parts.length=0;
    for(var k=0;k<n;k+=stride){ var o3=k*3, br=Math.min(1, pts[o3+2]/235);
      parts.push({ x:W/2+(Math.random()-0.5)*W*0.5, y:H/2+(Math.random()-0.5)*H*0.5, vx:0, vy:0,
        tx:pts[o3], ty:pts[o3+1], r:(230+25*br)|0, g:(190+55*br)|0, b:(120+90*br)|0,
        sz:(Math.random()*0.5+0.45)*DPR, ph:Math.random()*6.283, br:br }); }
  }

  function jagged(x0,y0,x1,y1,seg,amp){ var a=[x0,y0], px=-(y1-y0), py=(x1-x0), pl=Math.hypot(px,py)||1; px/=pl; py/=pl;
    for(var i=1;i<seg;i++){ var f=i/seg, off=(Math.random()-0.5)*amp*(1-Math.abs(f-0.5)*1.2); a.push(x0+(x1-x0)*f+px*off, y0+(y1-y0)*f+py*off); } a.push(x1,y1); return a; }
  function fireBolt(){ if(parts.length<2) return; var p=parts[(Math.random()*parts.length)|0], q=parts[(Math.random()*parts.length)|0];
    bolt={ pts:jagged(p.tx,p.ty,q.tx,q.ty,9,60*DPR), life:9 }; flash=Math.max(flash,0.45); }
  function fireSky(){ var side=Math.random()<0.5, x0=side?W*0.08:W*0.92; skyBolt={ pts:jagged(x0, -10, x0+(Math.random()-0.5)*W*0.3, H*(0.3+Math.random()*0.4), 11, 120*DPR), life:7 }; }

  function frame(){
    if(!W || W<2){ requestAnimationFrame(frame); return; }
    t+=0.016; if(flash>0) flash*=0.90; cohesion += (1-cohesion)*0.04;
    ctx.globalCompositeOperation='source-over'; ctx.clearRect(0,0,W,H);

    // ----- background atmosphere (lighter, faint, behind feel) -----
    ctx.globalCompositeOperation='lighter';
    for(var b=0;b<boke.length;b++){ var o=boke[b]; o.x+=o.vx; o.y+=o.vy; if(o.y<-o.r){o.y=H+o.r;o.x=Math.random()*W;}
      var ba=(0.05+0.04*Math.sin(t*0.6+o.ph))*o.z*(1+flash); var g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,'rgba(210,150,60,'+ba.toFixed(3)+')'); g.addColorStop(1,'rgba(210,150,60,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,6.283); ctx.fill(); }
    for(var e=0;e<bg.length;e++){ var p2=bg[e]; p2.x+=p2.vx; p2.y+=p2.vy; if(p2.y<-4){p2.y=H+4;p2.x=Math.random()*W;}
      var a2=(0.18+0.5*p2.z)*(0.5+0.5*Math.sin(t*1.6+p2.ph))*(0.5+flash*0.8);
      ctx.globalAlpha=Math.min(0.85,a2); ctx.fillStyle='rgb(255,210,120)';
      ctx.beginPath(); ctx.arc(p2.x,p2.y,(0.5+p2.z*1.3)*DPR,0,6.283); ctx.fill(); }
    // far sky lightning (rare)
    skyTimer--; if(skyTimer<=0){ fireSky(); skyTimer=240+(Math.random()*360|0); }
    if(skyBolt && skyBolt.life>0){ var sp=skyBolt.pts, sa=skyBolt.life/7;
      ctx.globalAlpha=sa*0.22; ctx.lineCap='round'; ctx.lineWidth=DPR*2.4; ctx.strokeStyle='rgba(230,180,90,1)';
      ctx.beginPath(); ctx.moveTo(sp[0],sp[1]); for(var sj=2;sj<sp.length;sj+=2) ctx.lineTo(sp[sj],sp[sj+1]); ctx.stroke(); skyBolt.life--; }

    // ----- sharp logo base (crisp + bright) -----
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=Math.max(0,cohesion);
    if(logoTex){ ctx.drawImage(logoTex,0,0);
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=Math.max(0,cohesion)*(0.35+flash*0.6); ctx.drawImage(logoTex,0,0); }

    if(parts.length<2){ ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; requestAnimationFrame(frame); return; }

    // ----- particle electric layer -----
    ctx.globalCompositeOperation='lighter';
    pulse += 0.0032; if(pulse>1.45) pulse=-0.35;
    var pulseY=pulse*H, pw=78*DPR, mr=130*DPR, mr2=mr*mr, near=[], pAlpha=(1-cohesion)*0.85, sparkle=cohesion*0.22;
    for(var i=0;i<parts.length;i++){ var p=parts[i]; p.vx+=(p.tx-p.x)*0.017; p.vy+=(p.ty-p.y)*0.017;
      var dx=p.x-mx, dy=p.y-my, d2=dx*dx+dy*dy;
      if(d2<mr2){ var f=(1-d2/mr2)*4, di=Math.sqrt(d2)||1; p.vx+=(dx/di)*f; p.vy+=(dy/di)*f; if(near.length<55) near.push(p); }
      p.vx*=0.885; p.vy*=0.885; p.x+=p.vx; p.y+=p.vy;
      var tw=0.7+0.3*Math.sin(t*2.4+p.ph), pg=Math.abs(p.y-pulseY)<pw?(1-Math.abs(p.y-pulseY)/pw):0;
      ctx.globalAlpha=Math.min(1,(pAlpha+sparkle*tw+pg*0.4*cohesion)); ctx.fillStyle='rgb('+p.r+','+p.g+','+p.b+')';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,6.283); ctx.fill(); }
    boltTimer--; if(boltTimer<=0){ fireBolt(); boltTimer=80+(Math.random()*120|0); }
    if(bolt && bolt.life>0){ var bp=bolt.pts, la=bolt.life/9; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.globalAlpha=la*0.45; ctx.lineWidth=DPR*4.5; ctx.strokeStyle='rgba(214,150,40,1)';
      ctx.beginPath(); ctx.moveTo(bp[0],bp[1]); for(var j=2;j<bp.length;j+=2) ctx.lineTo(bp[j],bp[j+1]); ctx.stroke();
      ctx.globalAlpha=la; ctx.lineWidth=DPR*1.4; ctx.strokeStyle='rgba(255,248,224,1)';
      ctx.beginPath(); ctx.moveTo(bp[0],bp[1]); for(var j2=2;j2<bp.length;j2+=2) ctx.lineTo(bp[j2],bp[j2+1]); ctx.stroke(); bolt.life--; }
    ctx.lineWidth=DPR*0.5; ctx.strokeStyle='rgba(255,228,150,1)';
    for(var a1=0;a1<near.length;a1++){ for(var c=a1+1;c<near.length;c++){ var q1=near[a1], w1=near[c], qx=q1.x-w1.x, qy=q1.y-w1.y, q2=qx*qx+qy*qy, lim=66*DPR;
      if(q2<lim*lim){ ctx.globalAlpha=(1-Math.sqrt(q2)/lim)*0.4; ctx.beginPath(); ctx.moveTo(q1.x,q1.y); ctx.lineTo(w1.x,w1.y); ctx.stroke(); } }}
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; requestAnimationFrame(frame);
  }

  function discharge(cx,cy){ cohesion=0;
    for(var i=0;i<parts.length;i++){ var p=parts[i], dx=p.x-cx, dy=p.y-cy, d=Math.sqrt(dx*dx+dy*dy)||1,
      force=(Math.min(150,26000/(d+60))+18)*DPR, ang=Math.atan2(dy,dx); p.vx+=Math.cos(ang)*force; p.vy+=Math.sin(ang)*force; }
    flash=1; fireBolt();
  }
  addEventListener('resize', rebuild);
  addEventListener('pointermove', function(e){ mx=e.clientX*DPR; my=e.clientY*DPR; });
  addEventListener('pointerleave', function(){ mx=my=-1e4; });
  addEventListener('pointerdown', function(e){ discharge(e.clientX*DPR, e.clientY*DPR); });
  img.onload=function(){ rebuild(); };
  if(img.complete && img.naturalWidth) rebuild();
  frame();
})();
</script>
</body>
</html>
