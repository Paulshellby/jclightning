<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4a6b3a"/><stop offset="1" stop-color="#2a4020"/></linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#555"/><stop offset="1" stop-color="#333"/></linearGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.12"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Ground line -->
  <line x1="200" y1="620" x2="600" y2="620" stroke="#ddd" stroke-width="2"/>
  <!-- Spike stake -->
  <polygon points="390,400 410,400 415,620 385,620" fill="url(#green)"/>
  <!-- Adjustable joint -->
  <circle cx="400" cy="400" r="15" fill="#444"/>
  <circle cx="400" cy="400" r="8" fill="#555"/>
  <!-- Arm -->
  <rect x="395" y="320" width="10" height="80" rx="3" fill="#555"/>
  <!-- Spotlight head -->
  <ellipse cx="400" cy="310" rx="55" ry="40" fill="url(#head)" filter="url(#sd)"/>
  <!-- Front lens -->
  <ellipse cx="400" cy="305" rx="40" ry="30" fill="#e8e5d8"/>
  <ellipse cx="400" cy="303" rx="30" ry="20" fill="#f5f2e5"/>
  <!-- LED -->
  <circle cx="400" cy="300" r="8" fill="#ffe8a0"/>
  <!-- Top light beam (angled up) -->
  <polygon points="380,290 420,290 500,80 300,80" fill="#ffe8a0" opacity="0.08" filter="url(#glow)"/>
  <!-- Adjustment arrows hint -->
  <path d="M350,300 Q320,300 320,280" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>