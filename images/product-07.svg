<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <radialGradient id="sphere" cx="0.4" cy="0.35" r="0.55"><stop offset="0" stop-color="#fff8e0"/><stop offset="0.6" stop-color="#ffe0a0"/><stop offset="1" stop-color="#e8c870"/></radialGradient>
    <linearGradient id="ss" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d0d0d0"/><stop offset="1" stop-color="#999"/></linearGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="8" flood-opacity="0.15"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Glow effect behind sphere -->
  <circle cx="400" cy="360" r="140" fill="#ffe8a0" opacity="0.12" filter="url(#glow)"/>
  <!-- Base plate -->
  <ellipse cx="400" cy="560" rx="90" ry="18" fill="url(#ss)" filter="url(#sd)"/>
  <rect x="350" y="530" width="100" height="30" rx="4" fill="#bbb"/>
  <!-- Stem -->
  <rect x="390" y="450" width="20" height="80" rx="3" fill="#ccc"/>
  <!-- Sphere -->
  <circle cx="400" cy="340" r="110" fill="url(#sphere)" filter="url(#sd)"/>
  <!-- Inner glow highlight -->
  <circle cx="380" cy="320" r="60" fill="#fff" opacity="0.3"/>
  <ellipse cx="370" cy="310" rx="30" ry="20" fill="#fff" opacity="0.2"/>
</svg>