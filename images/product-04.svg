<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="matte" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2a2a2a"/><stop offset="1" stop-color="#1a1a1a"/></linearGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.12"/></filter>
    <filter id="glowU"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glowD"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Wall plate -->
  <rect x="345" y="260" width="110" height="40" rx="5" fill="#3a3a3a"/>
  <!-- Vertical body -->
  <rect x="310" y="300" width="180" height="280" rx="10" fill="url(#matte)" filter="url(#sd)"/>
  <!-- Up light beam -->
  <polygon points="370,300 430,300 480,80 320,80" fill="#ffe8a0" opacity="0.15"/>
  <polygon points="380,300 420,300 450,120 350,120" fill="#ffe8a0" opacity="0.10"/>
  <!-- Down light beam -->
  <polygon points="370,580 430,580 480,720 320,720" fill="#ffe8a0" opacity="0.15"/>
  <polygon points="380,580 420,580 450,680 350,680" fill="#ffe8a0" opacity="0.10"/>
  <!-- LED strips -->
  <rect x="340" y="305" width="120" height="35" rx="4" fill="#f8f5e8"/>
  <rect x="340" y="555" width="120" height="35" rx="4" fill="#f8f5e8"/>
  <!-- Center detail -->
  <rect x="355" y="370" width="90" height="140" rx="3" fill="#252525"/>
</svg>