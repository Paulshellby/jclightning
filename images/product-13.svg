<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9b8365"/><stop offset="1" stop-color="#6b5535"/></linearGradient>
    <radialGradient id="glass" cx="0.4" cy="0.35" r="0.5"><stop offset="0" stop-color="#faf8f0"/><stop offset="1" stop-color="#e8dcc0"/></radialGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Display 8 stake lights arranged in 2 rows of 4 -->
  <g filter="url(#sd)">
    <!-- Row 1 -->
    <g transform="translate(140,220)">
      <rect x="-4" y="0" width="8" height="60" rx="2" fill="url(#bronze)"/>
      <path d="M-20,-15 L0,-35 L20,-15 Z" fill="url(#glass)"/>
      <rect x="-6" y="55" width="12" height="30" rx="2" fill="#7a6345"/>
      <line x1="0" y1="85" x2="0" y2="110" stroke="#8b7355" stroke-width="3"/>
    </g>
    <g transform="translate(280,210)">
      <rect x="-4" y="0" width="8" height="65" rx="2" fill="url(#bronze)"/>
      <path d="M-22,-18 L0,-40 L22,-18 Z" fill="url(#glass)"/>
      <rect x="-6" y="60" width="12" height="32" rx="2" fill="#7a6345"/>
      <line x1="0" y1="92" x2="0" y2="120" stroke="#8b7355" stroke-width="3"/>
    </g>
    <g transform="translate(420,225)">
      <rect x="-4" y="0" width="8" height="58" rx="2" fill="url(#bronze)"/>
      <path d="M-18,-14 L0,-34 L18,-14 Z" fill="url(#glass)"/>
      <rect x="-6" y="53" width="12" height="28" rx="2" fill="#7a6345"/>
      <line x1="0" y1="81" x2="0" y2="105" stroke="#8b7355" stroke-width="3"/>
    </g>
    <g transform="translate(560,230)">
      <rect x="-4" y="0" width="8" height="55" rx="2" fill="url(#bronze)"/>
      <path d="M-16,-12 L0,-30 L16,-12 Z" fill="url(#glass)"/>
      <rect x="-6" y="50" width="12" height="26" rx="2" fill="#7a6345"/>
      <line x1="0" y1="76" x2="0" y2="98" stroke="#8b7355" stroke-width="3"/>
    </g>
    <!-- Row 2 -->
    <g transform="translate(160,410)">
      <rect x="-4" y="0" width="8" height="60" rx="2" fill="#6b5535"/>
      <path d="M-20,-15 L0,-35 L20,-15 Z" fill="url(#glass)"/>
      <rect x="-6" y="55" width="12" height="30" rx="2" fill="#5a4020"/>
      <line x1="0" y1="85" x2="0" y2="110" stroke="#7a6345" stroke-width="3"/>
    </g>
    <g transform="translate(300,400)">
      <rect x="-4" y="0" width="8" height="65" rx="2" fill="#6b5535"/>
      <path d="M-22,-18 L0,-40 L22,-18 Z" fill="url(#glass)"/>
      <rect x="-6" y="60" width="12" height="32" rx="2" fill="#5a4020"/>
      <line x1="0" y1="92" x2="0" y2="120" stroke="#7a6345" stroke-width="3"/>
    </g>
    <g transform="translate(440,415)">
      <rect x="-4" y="0" width="8" height="58" rx="2" fill="#6b5535"/>
      <path d="M-18,-14 L0,-34 L18,-14 Z" fill="url(#glass)"/>
      <rect x="-6" y="53" width="12" height="28" rx="2" fill="#5a4020"/>
      <line x1="0" y1="81" x2="0" y2="105" stroke="#7a6345" stroke-width="3"/>
    </g>
    <g transform="translate(580,420)">
      <rect x="-4" y="0" width="8" height="55" rx="2" fill="#6b5535"/>
      <path d="M-16,-12 L0,-30 L16,-12 Z" fill="url(#glass)"/>
      <rect x="-6" y="50" width="12" height="26" rx="2" fill="#5a4020"/>
      <line x1="0" y1="76" x2="0" y2="98" stroke="#7a6345" stroke-width="3"/>
    </g>
  </g>
  <!-- Retail box hint -->
  <rect x="100" y="170" width="600" height="18" rx="4" fill="#eee" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="583" text-anchor="middle" font-family="Arial" font-size="14" fill="#999" letter-spacing="3">8-PACK RETAIL BOX</text>
</svg>