<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4a4a4a"/><stop offset="1" stop-color="#2d2d2d"/></linearGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Mounting bracket -->
  <rect x="375" y="100" width="50" height="60" rx="4" fill="#555"/>
  <rect x="350" y="150" width="100" height="25" rx="4" fill="#3d3d3d"/>
  <!-- Solar panel (separate) -->
  <rect x="220" y="210" width="360" height="70" rx="5" fill="#1a1a30" filter="url(#sd)"/>
  <line x1="280" y1="220" x2="280" y2="270" stroke="#2a2a4a" stroke-width="1"/><line x1="340" y1="220" x2="340" y2="270" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="400" y1="220" x2="400" y2="270" stroke="#2a2a4a" stroke-width="1"/><line x1="460" y1="220" x2="460" y2="270" stroke="#2a2a4a" stroke-width="1"/>
  <!-- Cable -->
  <line x1="400" y1="280" x2="400" y2="310" stroke="#333" stroke-width="4"/>
  <!-- Main floodlight body -->
  <rect x="230" y="310" width="340" height="250" rx="10" fill="url(#body)" filter="url(#sd)"/>
  <!-- Cooling fins -->
  <g stroke="#3d3d3d" stroke-width="2">
    <line x1="250" y1="325" x2="550" y2="325"/><line x1="250" y1="335" x2="550" y2="335"/>
    <line x1="250" y1="345" x2="550" y2="345"/><line x1="250" y1="355" x2="550" y2="355"/>
  </g>
  <!-- LED panel -->
  <rect x="250" y="370" width="300" height="160" rx="6" fill="#e8e5d8"/>
  <rect x="265" y="385" width="120" height="60" rx="4" fill="#f5f2e5"/><rect x="395" y="385" width="120" height="60" rx="4" fill="#f5f2e5"/>
  <rect x="265" y="455" width="120" height="60" rx="4" fill="#f5f2e5"/><rect x="395" y="455" width="120" height="60" rx="4" fill="#f5f2e5"/>
  <!-- PIR sensor -->
  <circle cx="400" cy="572" r="14" fill="#f0f0f0" stroke="#555" stroke-width="1"/>
</svg>