<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b6914"/><stop offset="0.5" stop-color="#6b4f10"/><stop offset="1" stop-color="#4a3608"/></linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.4" r="0.5"><stop offset="0" stop-color="#fff8e0"/><stop offset="0.7" stop-color="#ffe0a0"/><stop offset="1" stop-color="#d4a040"/></radialGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="8" flood-opacity="0.15"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Wall plate -->
  <rect x="335" y="220" width="130" height="50" rx="6" fill="url(#bronze)" filter="url(#sd)"/>
  <!-- Scroll arm -->
  <path d="M400,270 Q400,320 400,340" fill="none" stroke="#6b4f10" stroke-width="12" stroke-linecap="round"/>
  <!-- Lantern top -->
  <path d="M340,340 L400,370 L460,340 Z" fill="url(#bronze)"/>
  <rect x="345" y="330" width="110" height="12" rx="3" fill="#7b5a14"/>
  <!-- Glass panels -->
  <rect x="348" y="370" width="104" height="130" rx="4" fill="url(#lamp)" filter="url(#sd)"/>
  <!-- Glass frame lines -->
  <line x1="400" y1="370" x2="400" y2="500" stroke="#6b4f10" stroke-width="2"/>
  <line x1="348" y1="435" x2="452" y2="435" stroke="#6b4f10" stroke-width="2"/>
  <!-- Lantern bottom -->
  <path d="M340,500 L400,530 L460,500 Z" fill="url(#bronze)"/>
  <rect x="345" y="525" width="110" height="10" rx="3" fill="#7b5a14"/>
  <!-- Warm glow -->
  <ellipse cx="400" cy="440" rx="40" ry="50" fill="#ffe8a0" opacity="0.15" filter="url(#glow)"/>
</svg>