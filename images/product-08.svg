<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="ss" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0e0e0"/><stop offset="1" stop-color="#b0b0b0"/></linearGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Low-profile deck light body -->
  <rect x="250" y="320" width="300" height="130" rx="8" fill="url(#ss)" filter="url(#sd)"/>
  <!-- Face plate -->
  <rect x="260" y="330" width="280" height="110" rx="5" fill="#d5d5d5"/>
  <!-- LED strip -->
  <rect x="280" y="345" width="240" height="45" rx="4" fill="#f8f5e8"/>
  <rect x="290" y="350" width="65" height="35" rx="3" fill="#faf8e8"/><rect x="365" y="350" width="65" height="35" rx="3" fill="#faf8e8"/>
  <rect x="440" y="350" width="65" height="35" rx="3" fill="#faf8e8"/>
  <!-- Screws -->
  <circle cx="275" cy="365" r="4" fill="#aaa"/><circle cx="525" cy="365" r="4" fill="#aaa"/>
  <circle cx="275" cy="415" r="4" fill="#aaa"/><circle cx="525" cy="415" r="4" fill="#aaa"/>
  <!-- Light glow below -->
  <rect x="310" y="450" width="180" height="60" rx="30" fill="#ffe8a0" opacity="0.12"/>
</svg>