<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2a2a2a"/><stop offset="1" stop-color="#1a1a1a"/></linearGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Wall plate -->
  <rect x="330" y="200" width="140" height="50" rx="6" fill="#333"/>
  <circle cx="360" cy="225" r="5" fill="#555"/><circle cx="440" cy="225" r="5" fill="#555"/>
  <!-- Main rectangular body -->
  <rect x="240" y="260" width="320" height="320" rx="12" fill="url(#body)" filter="url(#sd)"/>
  <!-- LED array panel -->
  <rect x="265" y="285" width="270" height="200" rx="8" fill="#e8e5d8"/>
  <rect x="280" y="300" width="80" height="70" rx="4" fill="#f5f2e5"/><rect x="370" y="300" width="80" height="70" rx="4" fill="#f5f2e5"/>
  <rect x="280" y="380" width="80" height="70" rx="4" fill="#f5f2e5"/><rect x="370" y="380" width="80" height="70" rx="4" fill="#f5f2e5"/>
  <!-- PIR sensor dome -->
  <circle cx="400" cy="505" r="22" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <circle cx="400" cy="505" r="10" fill="#e8e8e8"/>
  <!-- Bottom label area -->
  <rect x="300" y="545" width="200" height="20" rx="4" fill="#333"/>
</svg>