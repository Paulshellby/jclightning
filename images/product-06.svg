<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffcc66" stop-opacity="0.8"/><stop offset="1" stop-color="#ffaa22" stop-opacity="0.2"/></radialGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Wire string -->
  <path d="M100,300 Q250,250 400,310 Q550,370 700,300" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Edison bulbs hanging from wire -->
  <g>
    <line x1="180" y1="283" x2="180" y2="340" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="180" cy="380" rx="22" ry="40" fill="url(#glow)" filter="url(#sd)"/>
    <ellipse cx="180" cy="380" rx="20" ry="38" fill="#fff8e0" opacity="0.6"/>
    <rect x="175" y="340" width="10" height="8" rx="2" fill="#888"/>
    <path d="M178,348 L175,354 L185,354 L182,348" fill="#888"/>
  </g>
  <g>
    <line x1="310" y1="284" x2="310" y2="335" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="310" cy="375" rx="22" ry="40" fill="url(#glow)" filter="url(#sd)"/>
    <ellipse cx="310" cy="375" rx="20" ry="38" fill="#fff8e0" opacity="0.6"/>
    <rect x="305" y="335" width="10" height="8" rx="2" fill="#888"/>
    <path d="M308,343 L305,349 L315,349 L312,343" fill="#888"/>
  </g>
  <g>
    <line x1="440" y1="316" x2="440" y2="365" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="440" cy="405" rx="22" ry="40" fill="url(#glow)" filter="url(#sd)"/>
    <ellipse cx="440" cy="405" rx="20" ry="38" fill="#fff8e0" opacity="0.6"/>
    <rect x="435" y="365" width="10" height="8" rx="2" fill="#888"/>
    <path d="M438,373 L435,379 L445,379 L442,373" fill="#888"/>
  </g>
  <g>
    <line x1="560" y1="304" x2="560" y2="350" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="560" cy="390" rx="22" ry="40" fill="url(#glow)" filter="url(#sd)"/>
    <ellipse cx="560" cy="390" rx="20" ry="38" fill="#fff8e0" opacity="0.6"/>
    <rect x="555" y="350" width="10" height="8" rx="2" fill="#888"/>
    <path d="M558,358 L555,364 L565,364 L562,358" fill="#888"/>
  </g>
  <!-- Solar panel -->
  <rect x="600" y="180" width="100" height="70" rx="6" fill="#1a1a30" filter="url(#sd)"/>
  <line x1="620" y1="190" x2="620" y2="240" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="650" y1="190" x2="650" y2="240" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="680" y1="190" x2="680" y2="240" stroke="#2a2a4a" stroke-width="1"/>
  <!-- Cable from panel to string -->
  <path d="M600,215 Q550,200 500,240 Q440,280 400,310" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
</svg>