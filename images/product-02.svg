<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="alum" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5a5a5a"/><stop offset="1" stop-color="#3a3a3a"/></linearGradient>
    <linearGradient id="solar" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1e1e3a"/><stop offset="1" stop-color="#161630"/></linearGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.12"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Pole mount -->
  <rect x="383" y="80" width="34" height="70" rx="4" fill="#606060"/>
  <rect x="373" y="140" width="54" height="22" rx="3" fill="#484848"/>
  <!-- Solar panel -->
  <rect x="160" y="210" width="480" height="100" rx="8" fill="url(#solar)" filter="url(#sd)"/>
  <g stroke="#2a2a4a" stroke-width="1" opacity="0.5">
    <line x1="240" y1="220" x2="240" y2="300"/><line x1="320" y1="220" x2="320" y2="300"/>
    <line x1="400" y1="220" x2="400" y2="300"/><line x1="480" y1="220" x2="480" y2="300"/>
    <line x1="560" y1="220" x2="560" y2="300"/>
  </g>
  <!-- Main body -->
  <rect x="200" y="320" width="400" height="220" rx="10" fill="url(#alum)" filter="url(#sd)"/>
  <!-- LED array -->
  <rect x="225" y="340" width="350" height="155" rx="6" fill="#e8e5d8"/>
  <g opacity="0.7">
    <rect x="240" y="355" width="95" height="42" rx="3" fill="#f8f5e8"/><rect x="345" y="355" width="95" height="42" rx="3" fill="#f8f5e8"/>
    <rect x="450" y="355" width="95" height="42" rx="3" fill="#f8f5e8"/><rect x="240" y="407" width="95" height="42" rx="3" fill="#f8f5e8"/>
    <rect x="345" y="407" width="95" height="42" rx="3" fill="#f8f5e8"/><rect x="450" y="407" width="95" height="42" rx="3" fill="#f8f5e8"/>
    <rect x="240" y="455" width="95" height="30" rx="3" fill="#f8f5e8"/><rect x="345" y="455" width="95" height="30" rx="3" fill="#f8f5e8"/>
  </g>
  <!-- Sensor -->
  <circle cx="400" cy="332" r="18" fill="#2a2a3a"/><circle cx="400" cy="332" r="8" fill="#3a3a5a"/>
  <!-- Brand strip -->
  <rect x="300" y="555" width="200" height="16" rx="4" fill="#484848"/>
</svg>