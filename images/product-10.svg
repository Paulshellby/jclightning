<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fafaf8"/><stop offset="1" stop-color="#f0efe9"/></linearGradient>
    <linearGradient id="khaki" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b9a6b"/><stop offset="1" stop-color="#5a6a40"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#fff8e0"/><stop offset="0.6" stop-color="#ffe0a0"/><stop offset="1" stop-color="#d4a040"/></radialGradient>
    <filter id="sd"><feDropShadow dx="2" dy="4" stdDeviation="8" flood-opacity="0.15"/></filter>
    <filter id="bglo"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <ellipse cx="400" cy="400" rx="120" ry="140" fill="#ffe8a0" opacity="0.1" filter="url(#bglo)"/>
  <!-- Handle -->
  <path d="M360,240 Q360,200 400,200 Q440,200 440,240" fill="none" stroke="#444" stroke-width="10" stroke-linecap="round"/>
  <circle cx="360" cy="240" r="8" fill="#555"/><circle cx="440" cy="240" r="8" fill="#555"/>
  <!-- Top cap -->
  <rect x="340" y="240" width="120" height="20" rx="5" fill="#3a3a3a"/>
  <!-- Cylinder body -->
  <rect x="320" y="260" width="160" height="220" rx="12" fill="url(#khaki)" filter="url(#sd)"/>
  <!-- Top stripe -->
  <rect x="320" y="265" width="160" height="25" rx="5" fill="#7a8a5a"/>
  <!-- Illuminated section -->
  <rect x="335" y="310" width="130" height="135" rx="8" fill="url(#glow)"/>
  <!-- Grid pattern on diffuser -->
  <g stroke="#d4a040" stroke-width="1" opacity="0.3">
    <line x1="335" y1="355" x2="465" y2="355"/><line x1="335" y1="400" x2="465" y2="400"/>
    <line x1="380" y1="310" x2="380" y2="445"/><line x1="420" y1="310" x2="420" y2="445"/>
  </g>
  <!-- Bottom stripe -->
  <rect x="320" y="455" width="160" height="25" rx="5" fill="#7a8a5a"/>
</svg>